<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khoirony Arief - Epic Open World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay" style="display: none;">
        <div class="login-box">
            <h2 style="margin-top:0; color:#1e90ff;">EPIC OPEN WORLD</h2>
            <p>Enter your name to start playing:</p>
            <input type="text" id="username-input" placeholder="Character Name..." maxlength="12" autocomplete="off">
            <button id="play-btn">SAVE & PLAY</button>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('mmo_username')) {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    </script>

    <div id="info">
        <div class="controls-hint"><b>Enter:</b> Chat (Type "/clear" to hide) | <b>WASD:</b> Move | <b>Space:</b> Jump | <b>Approach Object</b> to Interact</div>
    </div>

    <div id="hud-online">
        <div class="online-dot" id="online-dot"></div>
        <span id="online-count">...</span> Online
    </div>

    <div id="hud-time">
        <div id="hud-day">Day 1</div>
        <div id="hud-clock">08:00</div>
        <div id="hud-period">Morning</div>
    </div>

    <div id="hud-stats" style="position:absolute; top:65px; left:20px; background:rgba(0,0,0,0.6); color:white; padding:10px 20px; border-radius:12px; font-weight:bold; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); z-index:100; text-align: right;">
        <div style="color: #ffd700; margin-bottom: 5px;">💰 Coins: <span id="ui-coins">0</span></div>
        <div style="color: #00ffff;">🐟 Fish: <span id="ui-fish">0</span></div>
    </div>

    <div id="minimap-container">
        <canvas id="minimap" width="120" height="120"></canvas>
    </div>

    <div id="sound-btn">🔊 Sound</div>
    
    <div id="update-name-btn">✏️ Change Name</div>

    <div id="chat-toggle-btn">💬 Chat</div>
    <div id="chat-container"><input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off"></div>
    <div id="action-btn">Action</div>
    <div id="fade-overlay"></div>
    <div id="mobile-ui"><div id="joystick-zone"></div><div id="jump-btn">JUMP</div></div>

    <script type="importmap">{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module" src="game.js"></script>
</body>
</html>
