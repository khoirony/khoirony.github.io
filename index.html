<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khoirony 3D Portfolio - Mobile Support</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
        /* Mencegah layar tertarik / ter-refresh saat menggeser joystick di HP */
        body { margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: #87CEEB; touch-action: none; }
        
        #info {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black;
        }
        .controls-hint { font-size: 14px; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; display: inline-block; margin-top: 10px;}
        
        /* UI KHUSUS MOBILE */
        #mobile-ui {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; 
            pointer-events: none; z-index: 99;
            display: none; /* Disembunyikan secara default, dimunculkan di layar kecil */
        }
        
        /* Zona sentuh Joystick di kiri bawah */
        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px; 
            width: 120px; height: 120px; pointer-events: auto;
        }
        
        /* Tombol Lompat di kanan bawah */
        #jump-btn {
            position: absolute; bottom: 50px; right: 40px;
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.3); border: 2px solid rgba(255, 255, 255, 0.6);
            color: white; font-weight: bold; font-family: 'Poppins', sans-serif;
            pointer-events: auto; backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #jump-btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.95); }

        /* Media Query: Munculkan Joystick hanya di layar kecil (HP/Tablet) */
        @media (max-width: 800px) {
            #mobile-ui { display: block; }
            .controls-hint { display: none; } /* Sembunyikan instruksi keyboard di HP */
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>Khoirony Arief - Mobile 3D</h1>
        <div class="controls-hint">
            <b>Mouse:</b> Putar Kamera | <b>W A S D:</b> Berjalan | <b>Spasi:</b> Lompat
        </div>
    </div>

    <div id="mobile-ui">
        <div id="joystick-zone"></div>
        <div id="jump-btn">LOMPAT</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. SETUP SCENE, CAMERA, RENDERER
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -30; dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30; dirLight.shadow.camera.bottom = -30;
        scene.add(dirLight);

        // ==========================================
        // 2. LINGKUNGAN & COLLISION
        // ==========================================
        const collidables = [];
        function addCollisionBox(mesh) { collidables.push(new THREE.Box3().setFromObject(mesh)); }

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ color: 0x55aa55 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 1), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.y = 1.5; trunk.castShadow = true; trunk.receiveShadow = true; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
            leaves.position.y = 4; leaves.castShadow = true; leaves.receiveShadow = true; tree.add(leaves);
            tree.position.set(x, 0, z); scene.add(tree); addCollisionBox(tree);
        }
        function createWater(x, z, w, d) {
            const water = new THREE.Mesh(new THREE.BoxGeometry(w, 0.8, d), new THREE.MeshStandardMaterial({ color: 0x1E90FF, transparent: true, opacity: 0.8 }));
            water.position.set(x, 0.4, z); water.receiveShadow = true; scene.add(water); addCollisionBox(water);
        }
        function createBlock(color, x, z, h) {
            const block = new THREE.Mesh(new THREE.BoxGeometry(3, h, 3), new THREE.MeshStandardMaterial({ color: color }));
            block.position.set(x, h / 2, z); block.castShadow = true; block.receiveShadow = true; scene.add(block); addCollisionBox(block);
        }

        createBlock(0xdc2626, -5, -8, 2); createBlock(0x3b82f6, 0, -10, 4); createBlock(0x10b981, 5, -8, 2);  
        createTree(-10, -5); createTree(12, -12); createTree(8, 5); createTree(-15, 10);
        createWater(15, 0, 10, 20); createWater(-15, -15, 8, 8);

        // ==========================================
        // 3. MEMBANGUN KARAKTER
        // ==========================================
        const player = new THREE.Group(); scene.add(player); player.position.set(0, 0, 5);

        function createLimb(w, h, d, color, yPivot) {
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: color }));
            mesh.castShadow = true; mesh.position.y = -h / 2; 
            group.add(mesh); group.position.y = yPivot; return group;
        }

        const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), new THREE.MeshStandardMaterial({ color: 0x00aaff }));
        body.position.y = 1.125; body.castShadow = true; player.add(body);
        const head = createLimb(0.5, 0.5, 0.5, 0xffccaa, 1.5); head.children[0].position.y = 0.25; player.add(head);
        const armL = createLimb(0.25, 0.75, 0.25, 0xffccaa, 1.5); armL.position.x = 0.375; player.add(armL);
        const armR = createLimb(0.25, 0.75, 0.25, 0xffccaa, 1.5); armR.position.x = -0.375; player.add(armR);
        const legL = createLimb(0.25, 0.75, 0.25, 0x0000aa, 0.75); legL.position.x = 0.125; player.add(legL);
        const legR = createLimb(0.25, 0.75, 0.25, 0x0000aa, 0.75); legR.position.x = -0.125; player.add(legR);

        // ==========================================
        // 4. KONTROL KAMERA & FISIKA POKOK
        // ==========================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2.1; 
        controls.minDistance = 3; controls.maxDistance = 15;

        let velocityY = 0; const gravity = -0.015; let isJumping = false;
        const speed = 0.15; let moveTime = 0; const playerBox = new THREE.Box3();

        // ==========================================
        // 5. SISTEM INPUT (KEYBOARD & JOYSTICK)
        // ==========================================
        // A. Keyboard (Untuk Desktop)
        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // B. Virtual Joystick (NippleJS - Untuk Mobile)
        let joyX = 0, joyY = 0, isJoyActive = false;
        const joystickManager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white'
        });

        joystickManager.on('move', (evt, data) => {
            isJoyActive = true;
            joyX = data.vector.x; // Kanan (+), Kiri (-)
            joyY = data.vector.y; // Atas (+), Bawah (-)
        });
        joystickManager.on('end', () => {
            isJoyActive = false; joyX = 0; joyY = 0;
        });

        // C. Tombol Lompat Mobile
        const jumpBtn = document.getElementById('jump-btn');
        const triggerJump = (e) => {
            e.preventDefault();
            if (!isJumping) { velocityY = 0.25; isJumping = true; }
        };
        jumpBtn.addEventListener('touchstart', triggerJump, { passive: false });
        jumpBtn.addEventListener('mousedown', triggerJump);

        // ==========================================
        // 6. GAME LOOP UTAMA
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // --- LOMPAT & GRAVITASI ---
            velocityY += gravity; player.position.y += velocityY;
            if (player.position.y <= 0) { player.position.y = 0; velocityY = 0; isJumping = false; }
            
            // Lompat pakai keyboard
            if (keys[' '] && !isJumping) { velocityY = 0.25; isJumping = true; }

            // --- MENGGABUNGKAN INPUT JALAN ---
            const camForward = new THREE.Vector3();
            camera.getWorldDirection(camForward);
            camForward.y = 0; camForward.normalize();
            const camRight = new THREE.Vector3(-camForward.z, 0, camForward.x); 

            // Input Keyboard
            let inputY = (keys.w ? 1 : 0) - (keys.s ? 1 : 0);
            let inputX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
            
            // Tambahkan Input Joystick (Jika disentuh)
            if (isJoyActive) {
                inputY += joyY; // NippleJS vector.y itu Positif kalau di-drag ke atas
                inputX += joyX;
            }

            const moveDir = new THREE.Vector3();
            if (inputY !== 0) moveDir.addScaledVector(camForward, inputY);
            if (inputX !== 0) moveDir.addScaledVector(camRight, inputX);
            
            // Normalize agar jalan menyilang tidak ngebut
            if (moveDir.lengthSq() > 1) moveDir.normalize();

            // --- EKSEKUSI JALAN & TABRAKAN ---
            if (moveDir.lengthSq() > 0) {
                const nextPos = player.position.clone().addScaledVector(moveDir, speed);
                playerBox.min.set(nextPos.x - 0.375, nextPos.y, nextPos.z - 0.375);
                playerBox.max.set(nextPos.x + 0.375, nextPos.y + 1.75, nextPos.z + 0.375);

                let isColliding = false;
                for (let i = 0; i < collidables.length; i++) {
                    if (playerBox.intersectsBox(collidables[i])) { isColliding = true; break; }
                }

                if (!isColliding) player.position.copy(nextPos);

                player.lookAt(player.position.clone().add(moveDir));
                
                // Animasi Jalan
                moveTime += (0.2 * (isJoyActive ? Math.max(Math.abs(joyX), Math.abs(joyY)) : 1)); 
                armL.rotation.x = Math.sin(moveTime) * 0.8; armR.rotation.x = -Math.sin(moveTime) * 0.8;
                legL.rotation.x = -Math.sin(moveTime) * 0.8; legR.rotation.x = Math.sin(moveTime) * 0.8;
            } else {
                // Berhenti
                armL.rotation.x = THREE.MathUtils.lerp(armL.rotation.x, 0, 0.1);
                armR.rotation.x = THREE.MathUtils.lerp(armR.rotation.x, 0, 0.1);
                legL.rotation.x = THREE.MathUtils.lerp(legL.rotation.x, 0, 0.1);
                legR.rotation.x = THREE.MathUtils.lerp(legR.rotation.x, 0, 0.1);
            }

            // Update Kamera
            controls.target.set(player.position.x, player.position.y + 1.5, player.position.z);
            controls.update();

            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
