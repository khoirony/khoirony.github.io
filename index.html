<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khoirony Arief - Epic Open World</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="info">
        <div class="controls-hint"><b>Enter:</b> Chat (Type "/clear" to hide) | <b>WASD:</b> Move | <b>Space:</b> Jump | <b>Approach Object</b> to Interact</div>
    </div>

    <div id="hud-online">
        <div class="online-dot" id="online-dot"></div>
        <span id="online-count">...</span> Online
    </div>

    <div id="hud-time">
        <div id="hud-day">Day 1</div>
        <div id="hud-clock">08:00</div>
        <div id="hud-period">Morning</div>
    </div>
    <div id="sound-btn">🔊 Sound Kehidupan</div>

    <div id="chat-toggle-btn">💬 Chat</div>

    <div id="chat-container">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
    </div>

    <div id="action-btn">Action</div>
    <div id="fade-overlay"></div>

    <div id="mobile-ui">
        <div id="joystick-zone"></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="game.js"></script>
</body>
</html>
